# TODO: replace this docker-compose file with a working Antithesis test harness
# for this project.
#
# Set `name:` to the project name so Compose auto-prefixes service containers.
# Prefix `container_name:` and `image:` with the project name.
# Local images use `build:` so `compose build` can build them before `snouty run`.
# Public images (e.g. postgres, redis) use `image:` directly.
# Every service MUST include `platform: linux/amd64` — Antithesis runs on x86-64.
#
# Example:
#   name: foobar
#
#   services:
#     server:
#       container_name: foobar-server
#       platform: linux/amd64
#       build:
#         context: ../..           # repo root (relative to this file)
#         dockerfile: Dockerfile
#       image: foobar-server:latest
#
#     postgres:
#       container_name: foobar-postgres
#       platform: linux/amd64
#       image: docker.io/library/postgres:17.2

services:
  noop:
    platform: linux/amd64
    image: busybox:1.36
    command: ["sh", "-c", "tail -f /dev/null"]
